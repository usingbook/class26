  <body>
    <!-- DF 유튜브&비메오 코드 시작 -->
    <div class="df-iframe-container-20260604141256">
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/Kz2BsKX04ek?controls=1&autoplay=1&mute=1&loop=1&playlist=Kz2BsKX04ek"
        loading="lazy"
        data-video-type="youtube"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
    <style>
      .df-iframe-container-20260604141256 {
        position: relative;
        display: flex;
        margin-left: auto;
        margin-right: auto;
        width:100%;
        max-width: none;
        aspect-ratio: 16/9;
      }
      .df-iframe-container-20260604141256 iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .df-iframe-container-20260604141256 > div {
        display: flex;
        aspect-ratio: inherit;
        width: auto;
        min-width: auto;
        max-width: none;
        height: auto;
        min-height: auto;
        max-height: none;
        margin: 0;
        padding: 0;
      }
    </style>
